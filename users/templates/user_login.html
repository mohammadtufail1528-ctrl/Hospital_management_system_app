<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="/static/favicon.ico">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            font-family: new times roman, serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        /* Navbar */
        .navbar-custom {
            background: linear-gradient(135deg, #080d20, #0d0318);
        }

        .navbar-brand {
            font-weight: 600;
            color: #fff !important;
        }

        .nav-link {
            color: #dfd6d6 !important;
        }

        .nav-link:hover {
            color: #ffd700;
        }

        /* Card */
        .login-wrapper {
            min-height: calc(100vh - 70px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            position: relative;
        }

        .signup-card {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 380px; /* fixed mobile size */
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        @media (min-width: 768px) {
            .signup-card {
                max-width: 420px;
                padding: 40px;
            }
        }

        h1 {
            font-size: 22px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-control {
            padding: 12px;
            border-radius: 10px;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102,126,234,0.4);
        }

        button {
            background: #667eea;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 500;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .login-link {
            margin-top: 15px;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            font-weight: 500;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
            color: #5a67d8;
        }

        /* Mobile Fix */
        @media (max-width: 480px) {
            .signup-card {
                padding: 20px;
                border-radius: 12px;
            }
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="#">Medha-HMS</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon bg-light"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href='http://127.0.0.1:8000/'>Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Login</a></li>
                <li class="nav-item"><a class="nav-link" href="/signup">Signup</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Login Section -->
<div class="login-wrapper">
    <div class="signup-card">

        <h1>Login to your Account</h1>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Username" name="username">
            </div>

            <div class="mb-3">
                <input type="password" class="form-control" placeholder="Password" name="password">
            </div>

            <button type="submit" class="w-100 text-white">Login</button>
        </form>

        <div class="login-link">
            Don't have an account?
            <a href="/signup">Signup</a>
        </div>

    </div>
</div>

</body>
</html>

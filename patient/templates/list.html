<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient List</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8f9ff);
            min-height: 100vh;
            padding: 20px 10px;
        }

        .container-box {
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        h2 {
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Top buttons */
        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .back-btn, .create-btn {
            background: #667eea;
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
            font-size: 14px;
        }

        .create-btn {
            background: #4CAF50;
        }

        .back-btn:hover {
            background: #5a67d8;
            color: #fff;
        }

        .create-btn:hover {
            background: #3e8e41;
            color: #fff;
        }

        /* Table */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
            min-width: 700px;
        }

        th {
            background: #667eea;
            color: white;
            white-space: nowrap;
        }

        td, th {
            text-align: center;
            vertical-align: middle;
        }

        tr:hover {
            background: #f1f5ff;
            transition: 0.3s;
        }

        /* Buttons */
        .btn-custom {
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 13px;
        }

        .btn-edit {
            background: #4CAF50;
            color: white;
        }

        .btn-edit:hover {
            background: #3e8e41;
        }

        .btn-delete {
            background: #ff4d4d;
            color: white;
        }

        .btn-delete:hover {
            background: #e60000;
        }

        /* Mobile optimization */
        @media (max-width: 576px) {
            h2 {
                font-size: 20px;
            }

            .back-btn, .create-btn {
                width: 100%;
                text-align: center;
            }

            .top-actions {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="container-box">

        <!-- Top Buttons -->
        <div class="top-actions">
            <a href="/deshboard" class="back-btn">⬅ Back to Dashboard</a>
            <a href="/patient/create/" class="create-btn">➕ Create New Patient</a>
        </div>

        <h2>Patient List</h2>

        <!-- Responsive Table -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Phone</th>
                        <th>Gender</th>
                        <th>Blood</th>
                        <th>Address</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    {% for p in patient %}
                    <tr>
                        <td>{{ p.name }}</td>
                        <td>{{ p.age }}</td>
                        <td>{{ p.phone }}</td>
                        <td>{{ p.gender }}</td>
                        <td>{{ p.blood }}</td>
                        <td>{{ p.address }}</td>
                        <td>
                            <a href="/patient/{{ p.id }}/edit/" class="btn btn-custom btn-edit">Edit</a>
                            <a href="/patient/{{ p.id }}/delete/" class="btn btn-custom btn-delete">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient List</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8f9ff);
            min-height: 100vh;
            padding: 40px 15px;
        }

        .container-box {
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 {
            font-weight: 600;
            margin-bottom: 20px;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #667eea;
            color: white;
        }

        td, th {
            text-align: center;
            vertical-align: middle;
        }

        tr:hover {
            background: #f1f5ff;
            transition: 0.3s;
        }

        .btn-custom {
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-edit {
            background: #4CAF50;
            color: white;
        }

        .btn-edit:hover {
            background: #3e8e41;
        }

        .btn-delete {
            background: #ff4d4d;
            color: white;
        }

        .btn-delete:hover {
            background: #e60000;
        }

        .back-btn {
            margin-bottom: 20px;
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            color: #fff;
        }
        .create-btn {
            background: #667eea;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
            align to: right;
            float: right;
        }
        
    </style>
</head>
<body>

<div class="container">
    <div class="container-box">

        <!-- Back Button -->
        <a href="/deshboard " class="back-btn">⬅ Back to Dashboard</a>
        <a href="/patient/create/" class="create-btn">➕ Create New Patient</a>

        <h2>Patient List</h2>

        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Phone</th>
                    <th>Gender</th>
                    <th>Blood</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                {% for p in patient %}
                <tr>
                    <td>{{ p.name }}</td>
                    <td>{{ p.age }}</td>
                    <td>{{ p.phone }}</td>
                    <td>{{ p.gender }}</td>
                    <td>{{ p.blood }}</td>
                    <td>{{ p.address }}</td>
                    <td>
                        <a href="/patient/{{ p.id }}/edit/" class="btn btn-custom btn-edit">Edit</a>
                        <a href="/patient/{{ p.id }}/delete/" class="btn btn-custom btn-delete">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8f9ff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dashboard-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 600;
        }

        .dashboard-item {
            display: block;
            text-decoration: none;
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            color: #333;
            font-weight: 500;
            transition: 0.3s;
        }

        .dashboard-item:hover {
            background: #e0e7ff;
            transform: scale(1.03);
            color: #000;
        }

        .logout-btn {
            display: block;
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            background: #ff4d4d;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #e60000;
            transform: translateY(-2px);
            color: white;
        }
    </style>
</head>
<body>

<div class="dashboard-card">
    <h1>Dashboard</h1>

    <div>
        <a href="/patient/" class="dashboard-item">Patients</a>
        <a href="/doctor/" class="dashboard-item">Doctors</a>
        <a href="/appointments/" class="dashboard-item">Appointments</a>
    </div>

    <a href="/login/" class="logout-btn">Logout</a>
</div>

</body>
</html>

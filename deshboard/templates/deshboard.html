<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8f9ff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .dashboard-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 28px;
        }

        .dashboard-item {
            display: block;
            text-decoration: none;
            background: #f8f9ff;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            color: #333;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .dashboard-item:hover {
            background: #e0e7ff;
            transform: translateY(-3px);
            color: #000;
        }

        .logout-btn {
            display: block;
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            background: #ff4d4d;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #e60000;
            transform: translateY(-2px);
            color: white;
        }

        /* 📱 Mobile adjustments */
        @media (max-width: 576px) {
            .dashboard-card {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            .dashboard-item {
                padding: 12px;
                font-size: 14px;
            }

            .logout-btn {
                padding: 10px;
                font-size: 14px;
            }
        }

        /* 📲 Tablet adjustments */
        @media (min-width: 577px) and (max-width: 991px) {
            .dashboard-card {
                max-width: 600px;
            }
        }

        /* 💻 Large screen (optional improvement) */
        @media (min-width: 992px) {
            .dashboard-card {
                max-width: 500px;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-card">
    <h1>Dashboard</h1>

    <div>
        <a href="/patient/" class="dashboard-item">Patients</a>
        <a href="/doctor/" class="dashboard-item">Doctors</a>
        <a href="/appointments/" class="dashboard-item">Appointments</a>
    </div>

    <a href="/login/" class="logout-btn">Logout</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Delete Doctor</title>
</head>
<body>

<div class="container">
    <div class="container-box">
        <h2>Delete Doctor</h2>
        <p>Are you sure you want to delete this doctor?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-custom btn-save">Yes, Delete</button>
            <a href="/doctor/" class="btn btn-custom btn-cancel">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>

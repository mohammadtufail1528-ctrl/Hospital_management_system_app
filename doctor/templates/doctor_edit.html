<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Doctor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8f9ff);
            min-height: 100vh;
            padding: 40px 15px;
        }

        .container-box {
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 {
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        .btn-custom {
            border-radius: 8px;
            padding: 12px 25px;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-save {
            background: #4CAF50;
            color: white;
        }

        .btn-save:hover {
            background: #3e8e41;
        }

        .btn-cancel {
            background: #8a8d9b;
            color: white;
        }

        .btn-cancel:hover {
            background: #5a67d8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="container-box">

        <h2>Edit Doctor</h2>

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ doctor.name }}" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" class="form-control" id="phone" name="phone" value="{{ doctor.phone }}" required>
            </div>
            <div class="form-group">
                <label for="specilization">Specilization</label>
                <input type="text" class="form-control" id="specilization" name="specilization" value="{{ doctor.specilization }}" required>
            </div>
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" class="form-control" id="age" name="age" value="{{ doctor.age }}" required>    
            </div>
            <button type="submit" class="btn btn-custom btn-save">Save</button>
            <a href="/doctor/" class="btn btn-custom btn-cancel">Cancel</a>
        </form>

    </div>
</div>

</body>
</html>

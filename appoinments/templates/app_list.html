<!DOCTYPE hmtl>
<hmtl leng="en">
<head>
    <meta charset="UTF-8">
    <title>Appoinment List</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'new times roman', serif;
       background: linear-gradient(135deg, #a18cd1, #fbc2eb);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .table-container {
            background: #f2f7f6;
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 25px;
        }
        .table thead {
            background-color: #1130bb;
            color: #fff;
        }
        .table tbody tr:hover {
            background-color: #f06e6e;
        }
        
        #create-appoinment {
            background-color: #1130bb;
            color: #fff;
            border-radius: 8px;
            padding: 10px 20px;
            transition: 0.3s;
            align-self: flex-end;
            float:right;
        }
    </style>
</head>
<body>
    <div class="table-container">
        <h2>Appoinment List</h2>
     
        <table class="table table-striped">   <a href="/deshboard/" class="btn btn-primary mb-3">Back to Deshboard</a>
            <a href="/appointments/create/" class="btn btn-primary mb-3" id="create-appoinment">Create Appoinment</a>
            <thead>
                <tr>
                    <th>Patient</th>
                    <th>Doctor</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Reason</th>
                </tr>
            </thead>
            <tbody>
                {% for appoinment in appoinments %}
                <tr>
                    <td>{{ appoinment.patient }}</td>
                    <td>{{ appoinment.doctor }}</td>
                    <td>{{ appoinment.date }}</td>
                    <td>{{ appoinment.time }}</td>
                    <td>{{ appoinment.reason }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
